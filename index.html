<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toko UMKM Syawal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Toko UMKM Syawal</h1>
    <p>Produk lokal berkualitas dengan harga terjangkau</p>
  </header>

  <main>
    <section class="produk">
      <h2>Daftar Produk</h2>
      <div class="katalog">
        <div class="item">
          <img src="https://via.placeholder.com/150" alt="Produk 1">
          <h3>Kopi Sumatra</h3>
          <p>Rp 50.000</p>
          <button onclick="beli('Kopi Sumatra')">Beli</button>
        </div>
        <div class="item">
          <img src="https://via.placeholder.com/150" alt="Produk 2">
          <h3>Keripik Balado</h3>
          <p>Rp 25.000</p>
          <button onclick="beli('Keripik Balado')">Beli</button>
        </div>
        <div class="item">
          <img src="https://via.placeholder.com/150" alt="Produk 3">
          <h3>Rendang Kaleng</h3>
          <p>Rp 80.000</p>
          <button onclick="beli('Rendang Kaleng')">Beli</button>
        </div>
      </div>
    </section>
    <p id="pesan"></p>
  </main>

  <footer>
    <p>&copy; 2026 Toko UMKM Syawal</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
